<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Branding Staff — prototype</title>
    <!-- Altijd de nieuwste versie laden (geen oude cache) -->
    <script>
      document.write('<link rel="stylesheet" href="./styles.css?t=' + Date.now() + '">');
    </script>
  </head>
  <body>
    <!-- Telefoon-frame zodat het op desktop ook als app aanvoelt -->
    <div class="phone">
      <!-- Persistente status-balk (blijft staan op elk scherm) -->
      <header id="status-bar" class="statusbar" aria-live="polite"></header>

      <!-- Inhoud van het gekozen scherm -->
      <main id="view" class="view"></main>

      <!-- Onderbalk met de 5 hoofdkeuzes (Uber-stijl) -->
      <nav id="tabbar" class="tabbar"></nav>

      <!-- Beeldvullend scherm (beschikbaarheid / rode plekken) -->
      <div id="editor" class="editor hidden"></div>
    </div>

    <!-- Demo-knop: wissel van medewerker om alle statussen te zien -->
    <button id="persona-fab" class="persona-fab" title="Wissel demo-medewerker">👤</button>

    <!-- Onderschuivend paneel (voor status-details, persona-keuze, etc.) -->
    <div id="sheet-backdrop" class="sheet-backdrop hidden">
      <div id="sheet" class="sheet" role="dialog" aria-modal="true"></div>
    </div>

    <!-- Scripts met tijdstempel zodat de browser nooit een oude versie pakt -->
    <script>
      var _t = Date.now();
      document.write('<scr' + 'ipt src="./calendar.js?t=' + _t + '"><\/scr' + 'ipt>');
      document.write('<scr' + 'ipt src="./app.js?t=' + _t + '"><\/scr' + 'ipt>');
    </script>
  </body>
</html>
